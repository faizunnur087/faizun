<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>faizun</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .project-name {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #58a6ff, #79c0ff, #a5d6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .tagline {
      color: #8b949e;
      font-size: 1rem;
      line-height: 1.6;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #30363d;
      margin: 1.5rem 0;
    }

    .repo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .repo-label {
      color: #8b949e;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .repo-link:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #79c0ff;
    }

    .repo-link svg {
      flex-shrink: 0;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    footer {
      color: #484f58;
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem 0 1.5rem;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #6e7681;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .project-name {
        font-size: 2.2rem;
      }

      .card {
        padding: 2rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <span class="badge">&#x2022; Active Project</span>

    <div class="card">
      <div class="project-name">faizun</div>
      <p class="tagline">A modern open-source project built for performance,<br />clarity, and developer experience.</p>

      <div class="divider"></div>

      <div class="repo-section">
        <span class="repo-label">Repository</span>
        <a class="repo-link" href="https://github.com/faizun" target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          faizun
        </a>
      </div>

      <div class="divider"></div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">Open</span>
          <span class="stat-label">Source</span>
        </div>
        <div class="stat">
          <span class="stat-value">MIT</span>
          <span class="stat-label">License</span>
        </div>
        <div class="stat">
          <span class="stat-value">v1.0</span>
          <span class="stat-label">Version</span>
        </div>
      </div>
    </div>

  </div>

  <footer>
    Developed by <span>Royal Bengal AI</span>
  </footer>

</body>
</html>
